# Activate with: SPRING_PROFILES_ACTIVE=prod (or --spring.profiles.active=prod)
# Override secrets via environment variables — do not commit real passwords.

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/college_erp}
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false

server.port=${PORT:8080}

# Browsers only (SPA on another origin than the API). Native mobile apps ignore CORS.
# Replace with your real web app URL(s). Same machine as API still needs listing if the SPA is on another port/host.
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://your-frontend-host.example.com}
# Optional hybrid shells (Capacitor, etc.)
app.cors.extra-origin-patterns=${CORS_EXTRA_ORIGIN_PATTERNS:}
